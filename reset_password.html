<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password • KeepSafe</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #07071A;
      --card: rgba(22, 22, 58, 0.82);
      --violet: #7C3AED;
      --lavender: #A78BFA;
      --cyan: #06B6D4;
      --white: #F8F8FF;
      --muted: #8B8BAD;
      --border: rgba(167,139,250,0.22);
      --input-bg: rgba(255,255,255,0.05);
      --danger: #ff4d4d;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--white);
    }

    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at top left, rgba(124,58,237,0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(6,182,212,0.22), transparent 35%),
        linear-gradient(135deg, #07071A 0%, #0a0a24 100%);
    }

    .reset-card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 25px 70px rgba(0,0,0,0.55);
      backdrop-filter: blur(18px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      color: var(--white);
      margin-bottom: 2rem;
    }

    .shield {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      font-size: 1.5rem;
    }

    .brand-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1.5px;
    }

    .brand-name em {
      color: var(--lavender);
      font-style: normal;
    }

    h2 {
      text-align: center;
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 2rem;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: var(--lavender);
      font-weight: 600;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 52px 15px 48px;
      color: var(--white);
      font-size: 1rem;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: var(--lavender);
      box-shadow: 0 0 0 4px rgba(167,139,250,0.14);
    }

    .icon-left {
      position: absolute;
      left: 17px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .toggle-pass {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(90deg, var(--violet), var(--cyan));
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.8rem;
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #reset-msg {
      min-height: 22px;
      font-size: 0.92rem;
      margin-top: 8px;
      text-align: center;
      color: var(--danger);
    }

    #reset-msg.success {
      color: var(--success);
    }

    @media (max-width: 480px) {
      .auth-layout {
        padding: 14px;
      }

      .reset-card {
        padding: 1.5rem;
        border-radius: 22px;
      }

      .brand-name {
        font-size: 1.75rem;
      }

      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="auth-layout">
    <div class="reset-card">
      <a href="auth.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Sign In
      </a>

      <a href="index.html" class="brand">
        <div class="shield">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div class="brand-name">Keep<em>Safe</em></div>
      </a>

      <h2>Set New Password</h2>
      <p class="subtitle">Choose a strong password for your vault.</p>

      <div class="field">
        <label for="new-password">New Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock icon-left"></i>
          <input type="password" id="new-password" placeholder="Min. 12 characters" />
          <i class="fa-solid fa-eye toggle-pass" onclick="togglePassword('new-password', this)"></i>
        </div>
      </div>

      <div class="field">
        <label for="confirm-password">Confirm New Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock icon-left"></i>
          <input type="password" id="confirm-password" placeholder="Confirm your password" />
          <i class="fa-solid fa-eye toggle-pass" onclick="togglePassword('confirm-password', this)"></i>
        </div>
      </div>

      <div id="reset-msg"></div>

      <button class="submit-btn" id="submit-btn" onclick="updatePassword()">
        <i class="fa-solid fa-key"></i>
        Update Password
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = 'https://ssyaklpnjhoxukfanyxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWFrbHBuamhveHVrZmFueXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjA2NzUsImV4cCI6MjA5NjczNjY3NX0.H95B092ZXEAQz3l6-QefzWt44RZLpp5PdiEbLktstGE';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);

      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }
    

    async function updatePassword() {
      const password = document.getElementById('new-password').value.trim();
      const confirm = document.getElementById('confirm-password').value.trim();
      const msgEl = document.getElementById('reset-msg');
      const btn = document.getElementById('submit-btn');

      msgEl.textContent = '';
      msgEl.className = '';

      if (!password || !confirm) {
        msgEl.textContent = 'Please fill in both password fields.';
        return;
      }

      if (password !== confirm) {
        msgEl.textContent = "Passwords don't match.";
        return;
      }

      if (password.length < 12) {
        msgEl.textContent = 'Password must be at least 12 characters.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';

      try {
        const { error } = await supabase.auth.updateUser({
          password: password
        });

        if (error) throw error;

        msgEl.className = 'success';
        msgEl.textContent = '✅ Password updated successfully. Redirecting...';

        setTimeout(() => {
          window.location.href = 'auth.html';
        }, 2200);

      } catch (err) {
        msgEl.textContent = err.message || 'Failed to update password.';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-key"></i> Update Password';
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        updatePassword();
      }
    });
  </script>
</body>
</html>
