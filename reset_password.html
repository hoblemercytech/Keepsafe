<!DOCTYPE html>
<html lang="en">
<head>

  <title>Reset Password • KeepSafe</title>
  
    <!-- ============================================================
     KEEPSAFE PWA — PASTE INSIDE <head> OF EVERY PAGE
     ============================================================ -->
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Theme color (browser UI chrome) -->
  <meta name="theme-color" content="#7C3AED" />
  
  <!-- ── iOS Safari PWA support ── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KeepSafe" />
  
  <!-- iOS icons (generate these from your logo.png) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />

  <style>
    :root {
      --bg: #07071A;
      --card: rgba(22, 22, 58, 0.82);
      --violet: #7C3AED;
      --lavender: #A78BFA;
      --cyan: #06B6D4;
      --white: #F8F8FF;
      --muted: #8B8BAD;
      --border: rgba(167,139,250,0.22);
      --input-bg: rgba(255,255,255,0.05);
      --danger: #ff4d4d;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--white);
    }

    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at top left, rgba(124,58,237,0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(6,182,212,0.22), transparent 35%),
        linear-gradient(135deg, #07071A 0%, #0a0a24 100%);
    }

    .reset-card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 25px 70px rgba(0,0,0,0.55);
      backdrop-filter: blur(18px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      color: var(--white);
      margin-bottom: 2rem;
    }

    .shield {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      font-size: 1.5rem;
    }

    .brand-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1.5px;
    }

    .brand-name em {
      color: var(--lavender);
      font-style: normal;
    }

    h2 {
      text-align: center;
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 2rem;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: var(--lavender);
      font-weight: 600;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 52px 15px 48px;
      color: var(--white);
      font-size: 1rem;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: var(--lavender);
      box-shadow: 0 0 0 4px rgba(167,139,250,0.14);
    }

    .icon-left {
      position: absolute;
      left: 17px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .toggle-pass {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(90deg, var(--violet), var(--cyan));
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.8rem;
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #reset-msg {
      min-height: 22px;
      font-size: 0.92rem;
      margin-top: 8px;
      text-align: center;
      color: var(--danger);
    }

    #reset-msg.success {
      color: var(--success);
    }

    @media (max-width: 480px) {
      .auth-layout {
        padding: 14px;
      }

      .reset-card {
        padding: 1.5rem;
        border-radius: 22px;
      }

      .brand-name {
        font-size: 1.75rem;
      }

      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="auth-layout">
    <div class="reset-card">
      <a href="auth.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Sign In
      </a>

      <a href="index.html" class="brand">
        <div class="shield">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div class="brand-name">Keep<em>Safe</em></div>
      </a>

      <h2>Set New Password</h2>
      <p class="subtitle">Choose a strong password for your vault.</p>

      <div class="field">
        <label for="new-password">New Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock icon-left"></i>
          <input type="password" id="new-password" placeholder="Min. 12 characters" />
          <i class="fa-solid fa-eye toggle-pass" onclick="togglePassword('new-password', this)"></i>
        </div>
      </div>

      <div class="field">
        <label for="confirm-password">Confirm New Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock icon-left"></i>
          <input type="password" id="confirm-password"
  oninput="
    const p = document.getElementById('new-password').value.trim();
    const c = this.value.trim();
    if (p && c && p !== c) {
      showMsg('Passwords don\'t match yet…');
    } else if (p && c && p === c) {
      showMsg('');
    }
  "
  placeholder="Confirm your password"/>

          <i class="fa-solid fa-eye toggle-pass" onclick="togglePassword('confirm-password', this)"></i>
        </div>
      </div>

      <div id="reset-msg"></div>

      <button class="submit-btn" id="submit-btn" onclick="updatePassword()">
        <i class="fa-solid fa-key"></i>
        Update Password
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL      = 'https://kwxgaoyjbkawerguljtx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3eGdhb3lqYmthd2VyZ3VsanR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDI1MTAsImV4cCI6MjA5NzM3ODUxMH0.v39YkkhMsfwBJwPWbSdDjqHRozV9h6FdEhtM5KxakVI';

const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Wait for session from URL hash (Supabase puts token in hash on redirect) ──
_supabase.auth.onAuthStateChange(async (event, session) => {
  console.log('Auth event:', event, session?.user?.email);

  if (event === 'PASSWORD_RECOVERY') {
    // Good — user arrived from reset link
    console.log('✅ Password recovery session ready');
    document.getElementById('reset-form').style.display = 'block';
    document.getElementById('invalid-link').style.display = 'none';
  } else if (!session && event === 'SIGNED_OUT') {
    // Invalid or expired link
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-link').style.display = 'block';
  }
});


  // ── SERVICE WORKER REGISTRATION ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
        console.log('[PWA] Service Worker registered:', reg.scope);
        
        // Check for updates
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // New version available — show subtle toast if showToast exists
              if (typeof showToast === 'function') {
                showToast('🔄 App updated! Refresh for the latest version.', 'info');
              }
            }
          });
        });
      } catch (err) {
        console.warn('[PWA] Service Worker registration failed:', err);
      }
    });
  }
  
  // ── iOS SAFE AREA FIX ──
  // Prevents content hiding behind iPhone notch / Dynamic Island
  document.documentElement.style.setProperty(
    '--safe-top', 'env(safe-area-inset-top,    0px)'
  );
  document.documentElement.style.setProperty(
    '--safe-bottom', 'env(safe-area-inset-bottom, 0px)'
  );
  document.documentElement.style.setProperty(
    '--safe-left', 'env(safe-area-inset-left,   0px)'
  );
  document.documentElement.style.setProperty(
    '--safe-right', 'env(safe-area-inset-right,  0px)'
  );
  
  // ── INSTALL PROMPT (Android Chrome) ──
  let deferredPrompt = null;
  
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Show install banner after 30s if user hasn't dismissed
    setTimeout(() => {
      if (deferredPrompt) showInstallBanner();
    }, 30000);
  });
  
  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    const banner = document.getElementById('pwa-install-banner');
    if (banner) banner.remove();
    if (typeof showToast === 'function') {
      showToast('✅ KeepSafe installed successfully!', 'success');
    }
  });
  
  function showInstallBanner() {
    if (document.getElementById('pwa-install-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = `
      position: fixed;
      bottom: calc(var(--safe-bottom, 0px) + 80px);
      left: 16px; right: 16px;
      background: linear-gradient(135deg, #7C3AED, #5B21B6);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 8px 32px rgba(124,58,237,0.5);
      z-index: 9999;
      animation: slideUpBanner .4s cubic-bezier(.34,1.56,.64,1);
      font-family: 'Cabinet Grotesk', sans-serif;
    `;
    banner.innerHTML = `
      <style>
        @keyframes slideUpBanner {
          from { opacity:0; transform:translateY(20px) scale(.96); }
          to   { opacity:1; transform:translateY(0)    scale(1);   }
        }
      </style>
      <div style="font-size:28px;flex-shrink:0;">🔐</div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:2px;">Install KeepSafe</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.7);">Add to home screen for quick access</div>
      </div>
      <button onclick="installPWA()" style="
        padding:9px 16px; border-radius:10px; border:none;
        background:rgba(255,255,255,0.2); color:#fff;
        font-size:13px; font-weight:700; cursor:pointer;
        font-family:inherit; white-space:nowrap;
        backdrop-filter:blur(8px);
      ">Install</button>
      <button onclick="dismissInstallBanner()" style="
        width:28px; height:28px; border-radius:8px; border:none;
        background:rgba(255,255,255,0.15); color:#fff;
        font-size:16px; cursor:pointer; display:flex;
        align-items:center; justify-content:center;
        font-family:inherit; flex-shrink:0;
      ">×</button>
    `;
    document.body.appendChild(banner);
  }
  
  window.installPWA = async function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('[PWA] Install outcome:', outcome);
    deferredPrompt = null;
    dismissInstallBanner();
  };
  
  window.dismissInstallBanner = function() {
    const banner = document.getElementById('pwa-install-banner');
    if (banner) {
      banner.style.animation = 'none';
      banner.style.opacity = '0';
      banner.style.transform = 'translateY(20px)';
      banner.style.transition = 'all .25s ease';
      setTimeout(() => banner.remove(), 250);
    }
  };
// ── Password toggle ──
function togglePassword(inputId, icon) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

// ── Password strength (same as auth.html) ──
function checkStrength(val) {
  const el    = document.getElementById('pw-strength');
  const label = document.getElementById('strength-label');
  const bars  = ['sb1','sb2','sb3','sb4'].map(i => document.getElementById(i));
  if (!el) return true; // don't block if element missing
  bars.forEach(b => { if(b) b.className = ''; });
  if (!val) { el.style.display = 'none'; return false; }
  el.style.display = 'block';
  let s = 0;
  if (val.length >= 8)          s++;  // lowered from 12
  if (val.length >= 12)         s++;  // bonus for longer
  if (/[A-Z]/.test(val))        s++;
  if (/[0-9]/.test(val))        s++;
  if (/[^A-Za-z0-9]/.test(val)) s++;
  const lv     = Math.max(1, Math.min(s, 4));
  const levels = ['weak','fair','good','strong'];
  const labels = ['Too weak','Fair','Good','Strong 💪'];
  for (let i = 0; i < lv; i++) { if(bars[i]) bars[i].className = levels[lv-1]; }
  if (label) label.textContent = labels[lv-1];
  return val.length >= 8; // only block truly short passwords
}




// ── Show message ──
function showMsg(msg, type = 'error') {
  const el = document.getElementById('reset-msg');
  if (!el) return;
  el.textContent = msg;
  el.className   = type;
  el.style.display = msg ? 'flex' : 'none';
}

// ── Update password ──
async function updatePassword() {
  const passwordEl = document.getElementById('new-password');
  const confirmEl  = document.getElementById('confirm-password');
  const btn        = document.getElementById('submit-btn');

  // Trim both values to kill iOS autofill trailing spaces
  const password = passwordEl.value.trim();
  const confirm  = confirmEl.value.trim();

  // Also update the fields to trimmed values
  passwordEl.value = password;
  confirmEl.value  = confirm;

  showMsg('');

  if (!password || !confirm) {
    return showMsg('Please fill in both password fields.');
  }

  if (password !== confirm) {
    return showMsg(`Passwords don't match. (${password.length} vs ${confirm.length} chars)`);
  }

  if (password.length < 8) {
    return showMsg('Password must be at least 8 characters.');
  }

  // Relaxed strength check — just require length ≥ 8
  // Full strict check was blocking valid strong passwords
  btn.disabled  = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating…';

  try {
    const { error } = await _supabase.auth.updateUser({ password });
    if (error) throw error;

    // Send notification email
    try {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) {
        await fetch(
          `${SUPABASE_URL}/functions/v1/send-notification-email`,
          {
            method:  'POST',
            headers: {
              'Content-Type':  'application/json',
              'Authorization': `Bearer ${session.access_token}`,
              'apikey':        SUPABASE_ANON_KEY,
            },
            body: JSON.stringify({
              to:       session.user.email,
              userName: session.user.user_metadata?.full_name || 'there',
              type:     'profile_updated',
              title:    'Password Changed Successfully',
              message:  'Your KeepSafe password was just reset. If this wasn\'t you, secure your account immediately.',
              metadata: {
                time:   new Date().toLocaleString(),
                device: navigator.userAgent.split(')')[0].split('(')[1] || 'Unknown device',
              },
            }),
          }
        );
      }
    } catch(emailErr) {
      console.warn('Password reset email error:', emailErr.message);
    }

    showMsg('✅ Password updated! Redirecting to login…', 'success');
    await _supabase.auth.signOut();
    setTimeout(() => { window.location.href = '/auth.html'; }, 2200);

  } catch(err) {
    showMsg(err.message || 'Failed to update password. Link may have expired.');
    btn.disabled  = false;
    btn.innerHTML = '<i class="fa-solid fa-key"></i> Update Password';
  }
}


document.addEventListener('keydown', e => {
  if (e.key === 'Enter') updatePassword();
});

</script>
</body>
